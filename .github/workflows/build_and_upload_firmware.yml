name: Build and Upload Firmware

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v6.5.3). A GitHub release for this tag must already exist in this repo.'
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: ubicloud-standard-16
    steps:
      - name: Verify release exists for tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::error::No release found for tag $TAG in $REPO"
            exit 1
          fi
          echo "Release $TAG exists"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          
      #- name: Increase disk space
      #  uses: jlumbroso/free-disk-space@v1.3.1

      - name: Download Firmware Signing Key
        env:
          FIRMWARE_SIGNING_KEY: ${{ secrets.FIRMWARE_SIGNING_KEY }} 
        run: echo "$FIRMWARE_SIGNING_KEY" > firmware_signing_key.pem

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install pipenv
          pipenv install requests

      - name: Build and upload firmware (WebSocket and Standard)
        run: |
              for ws in ON OFF; do
                variant="STANDARD"
                [ "$ws" = "ON" ] && variant="WEBSOCKET"

                rm -rf build/
                ./local_build.sh "$TAG" coreone,mk4,xl "WebSocket:$ws"

                for firmware in build/*/firmware.bbf; do
                  parent_dir=$(basename $(dirname "$firmware"))
                  if [ "$parent_dir" = "products" ]; then
                    continue
                  fi
                  new_name="sp_prusa_${parent_dir}_${variant}_${TAG}+${COMMIT}@$(date +%d-%m-%Y).bbf"
                  mv "$firmware" "/tmp/$new_name"
                  gh release upload "$TAG" "/tmp/$new_name" --clobber
                done
              done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          COMMIT: ${{ github.sha }}
