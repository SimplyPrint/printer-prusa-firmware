name: Auto Build on Upstream Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.detect.outputs.tag }}
      presets: ${{ steps.detect.outputs.presets }}
    steps:
      - name: Detect new upstream release
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWN_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          UPSTREAM=$(gh api 'repos/prusa3d/Prusa-Firmware-Buddy/releases?per_page=20' \
            --jq 'map(select(.prerelease == false and .draft == false)) | .[0]')

          if [ -z "$UPSTREAM" ] || [ "$UPSTREAM" = "null" ]; then
            echo "No upstream final releases found"
            exit 0
          fi

          TAG=$(echo "$UPSTREAM" | jq -r '.tag_name')
          ASSETS=$(echo "$UPSTREAM" | jq -r '.assets[].name')

          echo "Latest upstream final release: $TAG"
          echo "Assets:"
          echo "$ASSETS"

          STATE=$(gh release view "$TAG" --repo "$OWN_REPO" --json isDraft -q '.isDraft' 2>/dev/null || true)
          if [ "$STATE" = "false" ]; then
            echo "Published release $TAG already exists in $OWN_REPO, nothing to do"
            exit 0
          fi
          if [ "$STATE" = "true" ]; then
            echo "Stale draft for $TAG exists from a prior failed run; will recreate"
          fi

          PRESETS=""
          while IFS= read -r asset; do
            case "$asset" in
              COREONE_L_*) PRESETS+="coreonel,"  ;;
              COREONE_*)   PRESETS+="coreone,"   ;;
              XL_*)        PRESETS+="xl,"        ;;
              MK4_*)       PRESETS+="mk4,"       ;;
            esac
          done <<< "$ASSETS"

          PRESETS=$(echo "$PRESETS" | tr ',' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')

          if [ -z "$PRESETS" ]; then
            echo "Upstream $TAG has no assets matching our supported presets (mk4, xl, coreone, coreonel); skipping"
            exit 0
          fi

          echo "Will build: $PRESETS"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "presets=$PRESETS" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: check-upstream
    if: needs.check-upstream.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Download Firmware Signing Key
        env:
          FIRMWARE_SIGNING_KEY: ${{ secrets.FIRMWARE_SIGNING_KEY }}
        run: echo "$FIRMWARE_SIGNING_KEY" > firmware_signing_key.pem

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install pipenv
          pipenv install requests

      - name: Build firmware (WebSocket and Standard)
        env:
          TAG: ${{ needs.check-upstream.outputs.tag }}
          PRESETS: ${{ needs.check-upstream.outputs.presets }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p /tmp/firmware-out

          rm -rf build/
          ./local_build.sh "$TAG" "$PRESETS" ON

          for firmware in build/*/firmware.bbf; do
            parent_dir=$(basename $(dirname "$firmware"))
            if [ "$parent_dir" = "products" ]; then
              continue
            fi
            preset="${parent_dir%_release_boot}"
            new_name="sp_prusa_${preset}_${TAG}+${COMMIT}@$(date +%d-%m-%Y).bbf"
            mv "$firmware" "/tmp/firmware-out/$new_name"
          done

      - name: Create draft release and upload binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-upstream.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes 2>/dev/null || true
          NOTES="Automated SimplyPrint firmware build mirroring upstream prusa3d/Prusa-Firmware-Buddy $TAG

          Based on https://github.com/prusa3d/Prusa-Firmware-Buddy/releases/tag/$TAG"
          gh release create "$TAG" --draft --prerelease --title "$TAG" --notes "$NOTES"
          gh release upload "$TAG" /tmp/firmware-out/*.bbf --clobber

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-upstream.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
